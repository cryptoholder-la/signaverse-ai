<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signaverse - Distributed Sign Language Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes pulse-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-slow {
            animation: pulse-slow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .gradient-border {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 2px;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-3">
                    <div class="w-8 h-8 bg-gradient-to-br from-purple-600 to-blue-500 rounded-lg flex items-center justify-center">
                        <i data-lucide="hands" class="w-5 h-5 text-white"></i>
                    </div>
                    <h1 class="text-xl font-bold text-gray-900">Signaverse</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="flex items-center space-x-2">
                        <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                        <span class="text-sm text-gray-600">Connected</span>
                    </div>
                    <button id="accountBtn" class="flex items-center space-x-2 px-3 py-2 rounded-lg hover:bg-gray-100 transition-colors">
                        <div class="w-6 h-6 bg-gray-300 rounded-full"></div>
                        <span class="text-sm font-medium">Account</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Network Status -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
            <div class="flex items-center justify-between">
                <div>
                    <h2 class="text-lg font-semibold text-gray-900">Network Status</h2>
                    <p class="text-sm text-gray-600 mt-1">Distributed collaborative network</p>
                </div>
                <div class="flex items-center space-x-6">
                    <div class="text-center">
                        <div class="text-2xl font-bold text-gray-900" id="peerCount">0</div>
                        <div class="text-xs text-gray-500">Peers</div>
                    </div>
                    <div class="text-center">
                        <div class="text-2xl font-bold text-gray-900" id="commitCount">0</div>
                        <div class="text-xs text-gray-500">Commits</div>
                    </div>
                    <div class="text-center">
                        <div class="text-2xl font-bold text-gray-900" id="syncStatus">Syncing</div>
                        <div class="text-xs text-gray-500">Status</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab Navigation -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 mb-6">
            <div class="border-b border-gray-200">
                <nav class="flex space-x-8 px-6" aria-label="Tabs">
                    <button class="tab-btn py-4 px-1 border-b-2 border-purple-500 font-medium text-sm text-purple-600" data-tab="sign-language">
                        Sign Language
                    </button>
                    <button class="tab-btn py-4 px-1 border-b-2 border-transparent font-medium text-sm text-gray-500 hover:text-gray-700 hover:border-gray-300" data-tab="documents">
                        Documents
                    </button>
                    <button class="tab-btn py-4 px-1 border-b-2 border-transparent font-medium text-sm text-gray-500 hover:text-gray-700 hover:border-gray-300" data-tab="messaging">
                        Messaging
                    </button>
                    <button class="tab-btn py-4 px-1 border-b-2 border-transparent font-medium text-sm text-gray-500 hover:text-gray-700 hover:border-gray-300" data-tab="agents">
                        AI Agents
                    </button>
                </nav>
            </div>

            <!-- Tab Content -->
            <div class="p-6">
                <!-- Sign Language Tab -->
                <div id="sign-language-tab" class="tab-content">
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <!-- Upload Video -->
                        <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:border-purple-400 transition-colors">
                            <i data-lucide="upload" class="w-12 h-12 text-gray-400 mx-auto mb-4"></i>
                            <h3 class="text-lg font-medium text-gray-900 mb-2">Upload Sign Video</h3>
                            <p class="text-sm text-gray-600 mb-4">Share sign language videos with the network</p>
                            <input type="file" id="videoUpload" accept="video/*" class="hidden">
                            <button onclick="document.getElementById('videoUpload').click()" 
                                    class="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition-colors">
                                Choose Video
                            </button>
                        </div>

                        <!-- Recent Videos -->
                        <div>
                            <h3 class="text-lg font-medium text-gray-900 mb-4">Recent Videos</h3>
                            <div id="recentVideos" class="space-y-3">
                                <!-- Videos will be populated here -->
                            </div>
                        </div>
                    </div>

                    <!-- Translation Queue -->
                    <div class="mt-6">
                        <h3 class="text-lg font-medium text-gray-900 mb-4">Translation Queue</h3>
                        <div id="translationQueue" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            <!-- Translation tasks will be populated here -->
                        </div>
                    </div>
                </div>

                <!-- Documents Tab -->
                <div id="documents-tab" class="tab-content hidden">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-lg font-medium text-gray-900">Collaborative Documents</h3>
                        <button id="createDocBtn" class="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition-colors flex items-center space-x-2">
                            <i data-lucide="plus" class="w-4 h-4"></i>
                            <span>Create Document</span>
                        </button>
                    </div>
                    <div id="documentsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        <!-- Documents will be populated here -->
                    </div>
                </div>

                <!-- Messaging Tab -->
                <div id="messaging-tab" class="tab-content hidden">
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <!-- Channels List -->
                        <div class="lg:col-span-1">
                            <h3 class="text-lg font-medium text-gray-900 mb-4">Channels</h3>
                            <div id="channelsList" class="space-y-2">
                                <!-- Channels will be populated here -->
                            </div>
                        </div>

                        <!-- Chat Area -->
                        <div class="lg:col-span-2">
                            <div class="bg-gray-50 rounded-lg p-4 h-96 flex flex-col">
                                <div id="messagesContainer" class="flex-1 overflow-y-auto space-y-3 mb-4">
                                    <!-- Messages will be populated here -->
                                </div>
                                <div class="flex space-x-2">
                                    <input type="text" id="messageInput" placeholder="Type a message..." 
                                           class="flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                                    <button id="sendMessageBtn" class="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition-colors">
                                        Send
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- AI Agents Tab -->
                <div id="agents-tab" class="tab-content hidden">
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <!-- Agent Status -->
                        <div>
                            <h3 class="text-lg font-medium text-gray-900 mb-4">Active Agents</h3>
                            <div id="agentsList" class="space-y-3">
                                <!-- Agents will be populated here -->
                            </div>
                        </div>

                        <!-- Agent Tasks -->
                        <div>
                            <h3 class="text-lg font-medium text-gray-900 mb-4">Task Queue</h3>
                            <div id="agentTasks" class="space-y-3">
                                <!-- Tasks will be populated here -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Create Document Modal -->
    <div id="createDocModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-xl p-6 w-full max-w-md">
            <h3 class="text-lg font-semibold text-gray-900 mb-4">Create New Document</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Title</label>
                    <input type="text" id="docTitle" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Content</label>
                    <textarea id="docContent" rows="4" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"></textarea>
                </div>
            </div>
            <div class="flex justify-end space-x-3 mt-6">
                <button onclick="closeCreateDocModal()" class="px-4 py-2 text-gray-700 hover:bg-gray-100 rounded-lg transition-colors">
                    Cancel
                </button>
                <button onclick="createDocument()" class="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition-colors">
                    Create
                </button>
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // State management
        const state = {
            currentTab: 'sign-language',
            peers: 12,
            commits: 156,
            syncStatus: 'Connected',
            videos: [],
            documents: [],
            messages: [],
            channels: [],
            agents: [],
            selectedChannel: null
        };

        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tabName = btn.dataset.tab;
                switchTab(tabName);
            });
        });

        function switchTab(tabName) {
            // Update button states
            document.querySelectorAll('.tab-btn').forEach(btn => {
                if (btn.dataset.tab === tabName) {
                    btn.classList.add('border-purple-500', 'text-purple-600');
                    btn.classList.remove('border-transparent', 'text-gray-500');
                } else {
                    btn.classList.remove('border-purple-500', 'text-purple-600');
                    btn.classList.add('border-transparent', 'text-gray-500');
                }
            });

            // Update content visibility
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.add('hidden');
            });
            document.getElementById(`${tabName}-tab`).classList.remove('hidden');

            state.currentTab = tabName;
        }

        // Update network stats
        function updateNetworkStats() {
            document.getElementById('peerCount').textContent = state.peers;
            document.getElementById('commitCount').textContent = state.commits;
            document.getElementById('syncStatus').textContent = state.syncStatus;
        }

        // Video upload handling
        document.getElementById('videoUpload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                // Simulate upload
                const videoData = {
                    video_hash: `video_${Date.now()}`,
                    signer_id: 'user_123',
                    language: 'ASL',
                    duration: 5.2,
                    resolution: '1920x1080',
                    format: file.type.split('/')[1]
                };

                // Add to state
                state.videos.unshift({
                    ...videoData,
                    upload_time: new Date().toISOString(),
                    status: 'processing'
                });

                updateRecentVideos();
                
                // Simulate processing
                setTimeout(() => {
                    const video = state.videos.find(v => v.video_hash === videoData.video_hash);
                    if (video) {
                        video.status = 'completed';
                        updateRecentVideos();
                    }
                }, 3000);
            }
        });

        function updateRecentVideos() {
            const container = document.getElementById('recentVideos');
            if (state.videos.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center">No videos uploaded yet</p>';
                return;
            }

            container.innerHTML = state.videos.slice(0, 5).map(video => `
                <div class="flex items-center space-x-3 p-3 bg-gray-50 rounded-lg">
                    <div class="w-10 h-10 bg-purple-100 rounded-lg flex items-center justify-center">
                        <i data-lucide="play" class="w-5 h-5 text-purple-600"></i>
                    </div>
                    <div class="flex-1">
                        <div class="font-medium text-sm">${video.video_hash}</div>
                        <div class="text-xs text-gray-500">${video.language} • ${video.duration}s</div>
                    </div>
                    <div class="text-xs px-2 py-1 rounded-full ${
                        video.status === 'completed' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'
                    }">
                        ${video.status}
                    </div>
                </div>
            `).join('');

            // Re-initialize icons
            lucide.createIcons();
        }

        // Document handling
        document.getElementById('createDocBtn').addEventListener('click', () => {
            document.getElementById('createDocModal').classList.remove('hidden');
        });

        function closeCreateDocModal() {
            document.getElementById('createDocModal').classList.add('hidden');
            document.getElementById('docTitle').value = '';
            document.getElementById('docContent').value = '';
        }

        function createDocument() {
            const title = document.getElementById('docTitle').value;
            const content = document.getElementById('docContent').value;

            if (title && content) {
                const doc = {
                    doc_id: `doc_${Date.now()}`,
                    title,
                    content: { text: content },
                    author: 'user_123',
                    created_at: new Date().toISOString(),
                    version: 1
                };

                state.documents.unshift(doc);
                updateDocumentsList();
                closeCreateDocModal();
            }
        }

        function updateDocumentsList() {
            const container = document.getElementById('documentsList');
            if (state.documents.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center col-span-full">No documents yet</p>';
                return;
            }

            container.innerHTML = state.documents.map(doc => `
                <div class="bg-white border border-gray-200 rounded-lg p-4 hover:shadow-md transition-shadow cursor-pointer">
                    <h4 class="font-medium text-gray-900 mb-2">${doc.title}</h4>
                    <p class="text-sm text-gray-600 mb-3 line-clamp-2">${doc.content.text}</p>
                    <div class="flex items-center justify-between text-xs text-gray-500">
                        <span>v${doc.version} • ${new Date(doc.created_at).toLocaleDateString()}</span>
                        <div class="flex space-x-2">
                            <button class="text-purple-600 hover:text-purple-700">Edit</button>
                            <button class="text-gray-600 hover:text-gray-700">Share</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Messaging
        function initializeMessaging() {
            // Sample channels
            state.channels = [
                { channel_id: 'general', name: 'General', members: 12, unread: 3 },
                { channel_id: 'sign-language', name: 'Sign Language', members: 8, unread: 0 },
                { channel_id: 'translations', name: 'Translations', members: 5, unread: 1 }
            ];

            // Sample messages
            state.messages = [
                { id: '1', sender: 'Alice', content: 'Just uploaded a new ASL video!', timestamp: new Date(Date.now() - 3600000).toISOString() },
                { id: '2', sender: 'Bob', content: 'Great work on the translation queue', timestamp: new Date(Date.now() - 1800000).toISOString() },
                { id: '3', sender: 'Carol', content: 'The collaborative editing is working well', timestamp: new Date(Date.now() - 600000).toISOString() }
            ];

            updateChannelsList();
            updateMessages();
        }

        function updateChannelsList() {
            const container = document.getElementById('channelsList');
            container.innerHTML = state.channels.map(channel => `
                <div class="flex items-center justify-between p-3 rounded-lg cursor-pointer hover:bg-gray-50 ${
                    state.selectedChannel === channel.channel_id ? 'bg-purple-50 border-l-4 border-purple-500' : ''
                }" onclick="selectChannel('${channel.channel_id}')">
                    <div class="flex items-center space-x-3">
                        <div class="w-8 h-8 bg-purple-100 rounded-full flex items-center justify-center">
                            <span class="text-xs font-medium text-purple-600">#</span>
                        </div>
                        <div>
                            <div class="font-medium text-sm">${channel.name}</div>
                            <div class="text-xs text-gray-500">${channel.members} members</div>
                        </div>
                    </div>
                    ${channel.unread > 0 ? `<div class="w-5 h-5 bg-red-500 text-white text-xs rounded-full flex items-center justify-center">${channel.unread}</div>` : ''}
                </div>
            `).join('');
        }

        function selectChannel(channelId) {
            state.selectedChannel = channelId;
            updateChannelsList();
            updateMessages();
        }

        function updateMessages() {
            const container = document.getElementById('messagesContainer');
            if (state.messages.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center">No messages yet</p>';
                return;
            }

            container.innerHTML = state.messages.map(msg => `
                <div class="flex items-start space-x-3">
                    <div class="w-8 h-8 bg-gray-300 rounded-full flex items-center justify-center">
                        <span class="text-xs font-medium">${msg.sender[0]}</span>
                    </div>
                    <div class="flex-1">
                        <div class="flex items-center space-x-2 mb-1">
                            <span class="font-medium text-sm">${msg.sender}</span>
                            <span class="text-xs text-gray-500">${new Date(msg.timestamp).toLocaleTimeString()}</span>
                        </div>
                        <div class="text-sm text-gray-700">${msg.content}</div>
                    </div>
                </div>
            `).join('');
        }

        // Message sending
        document.getElementById('sendMessageBtn').addEventListener('click', sendMessage);
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();

            if (content && state.selectedChannel) {
                const message = {
                    id: `msg_${Date.now()}`,
                    sender: 'You',
                    content,
                    timestamp: new Date().toISOString()
                };

                state.messages.push(message);
                updateMessages();
                input.value = '';
            }
        }

        // AI Agents
        function initializeAgents() {
            state.agents = [
                {
                    agent_id: 'agent_001',
                    name: 'Translation Agent',
                    type: 'translation',
                    status: 'active',
                    tasks_completed: 45,
                    capabilities: ['sign_to_text', 'text_to_sign']
                },
                {
                    agent_id: 'agent_002',
                    name: 'Validation Agent',
                    type: 'validation',
                    status: 'active',
                    tasks_completed: 23,
                    capabilities: ['sign_validation', 'quality_check']
                }
            ];

            updateAgentsList();
        }

        function updateAgentsList() {
            const container = document.getElementById('agentsList');
            container.innerHTML = state.agents.map(agent => `
                <div class="bg-white border border-gray-200 rounded-lg p-4">
                    <div class="flex items-center justify-between mb-3">
                        <h4 class="font-medium text-gray-900">${agent.name}</h4>
                        <div class="flex items-center space-x-2">
                            <div class="w-2 h-2 bg-green-500 rounded-full"></div>
                            <span class="text-xs text-gray-500">${agent.status}</span>
                        </div>
                    </div>
                    <div class="text-sm text-gray-600 mb-3">
                        Type: ${agent.type}<br>
                        Tasks completed: ${agent.tasks_completed}
                    </div>
                    <div class="flex flex-wrap gap-1">
                        ${agent.capabilities.map(cap => `
                            <span class="text-xs px-2 py-1 bg-purple-100 text-purple-700 rounded-full">${cap}</span>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        // Initialize the app
        function initializeApp() {
            updateNetworkStats();
            updateRecentVideos();
            updateDocumentsList();
            initializeMessaging();
            initializeAgents();

            // Simulate network updates
            setInterval(() => {
                state.peers = Math.max(8, state.peers + Math.floor(Math.random() * 3) - 1);
                state.commits += Math.floor(Math.random() * 2);
                updateNetworkStats();
            }, 5000);
        }

        // Start the app
        initializeApp();
    </script>
</body>
</html>
