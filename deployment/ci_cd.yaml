name: Signaverse CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Install
        run: pip install -r requirements.txt
      - name: Run Tests
        run: pytest
      - name: Build Docker
        run: docker build -t signaverse .